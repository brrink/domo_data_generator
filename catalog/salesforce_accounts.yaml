dataset:
  name: Salesforce - Accounts
  domo_id: 30e3bef8-362c-490c-8f65-a5f7f763ccba
  source_type: salesforce
  description: Sample Salesforce account data representing customer organizations
  row_count: 500
schema:
- name: AccountId
  type: STRING
  generator: sf_id
  template: '001'
- name: AccountName
  type: STRING
  generator: entity_ref
  entity: company
  field: name
- name: Industry
  type: STRING
  generator: entity_ref
  entity: company
  field: industry
- name: AnnualRevenue
  type: DECIMAL
  generator: entity_ref
  entity: company
  field: annual_revenue
- name: NumberOfEmployees
  type: LONG
  generator: entity_ref
  entity: company
  field: employee_count
- name: BillingCity
  type: STRING
  generator: entity_ref
  entity: company
  field: city
- name: BillingState
  type: STRING
  generator: entity_ref
  entity: company
  field: state
- name: Website
  type: STRING
  generator: entity_ref
  entity: company
  field: domain
- name: Type
  type: STRING
  generator: weighted_choice
  choices:
    Customer: 0.4
    Prospect: 0.3
    Partner: 0.15
    Competitor: 0.05
    Other: 0.1
- name: Rating
  type: STRING
  generator: sf_lead_rating
- name: CompanySize
  type: STRING
  generator: entity_ref
  entity: company
  field: size
- name: OwnerId
  type: STRING
  generator: entity_ref
  entity: sales_rep
  field: rep_id
- name: OwnerName
  type: STRING
  generator: entity_ref
  entity: sales_rep
  field: full_name
- name: CreatedDate
  type: DATETIME
  generator: date_range
  start_days_ago: 730
  end_days_ahead: 0
  rolling: true
- name: LastModifiedDate
  type: DATETIME
  generator: date_range
  start_days_ago: 90
  end_days_ahead: 0
  rolling: true
