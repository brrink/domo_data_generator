dataset:
  name: Facebook Ads - Campaign Performance
  domo_id: d9953835-f2cf-4a6e-b0c9-3f9f2f575180
  source_type: facebook_ads
  description: Sample Facebook/Meta Ads campaign performance data
  row_count: 2500
schema:
- name: Date
  type: DATE
  generator: date_range
  start_days_ago: 90
  end_days_ahead: 0
  rolling: true
- name: CampaignName
  type: STRING
  generator: entity_ref
  entity: campaign
  field: name
- name: CampaignObjective
  type: STRING
  generator: campaign_objective
- name: AdSetName
  type: STRING
  generator: compound
  template: '{campaign} - Audience'
  refs:
  - campaign
- name: AdFormat
  type: STRING
  generator: weighted_choice
  choices:
    Single Image: 0.3
    Carousel: 0.25
    Video: 0.25
    Collection: 0.1
    Stories: 0.1
- name: Impressions
  type: LONG
  generator: impressions
  min: 500
  max: 100000
- name: Reach
  type: LONG
  generator: impressions
  min: 300
  max: 80000
- name: Clicks
  type: LONG
  generator: clicks_from_impressions
  source_column: Impressions
- name: CostPerClick
  type: DECIMAL
  generator: cost_per_click
  min: 0.2
  max: 8.0
- name: Spend
  type: DECIMAL
  generator: ad_spend
  refs:
  - Clicks
  - CostPerClick
- name: Conversions
  type: LONG
  generator: conversions_from_clicks
  source_column: Clicks
- name: TargetingType
  type: STRING
  generator: targeting_type
- name: AgeRange
  type: STRING
  generator: random_choice
  choices:
  - 18-24
  - 25-34
  - 35-44
  - 45-54
  - 55-64
  - 65+
- name: Gender
  type: STRING
  generator: weighted_choice
  choices:
    All: 0.4
    Male: 0.3
    Female: 0.3
- name: Placement
  type: STRING
  generator: weighted_choice
  choices:
    Facebook Feed: 0.35
    Instagram Feed: 0.25
    Stories: 0.15
    Reels: 0.1
    Audience Network: 0.1
    Marketplace: 0.05
