dataset:
  name: QuickBooks - Invoices
  domo_id: 8a12226a-e300-4666-8919-aa2e77b62836
  source_type: quickbooks
  description: Sample QuickBooks-style invoice data
  row_count: 3000
schema:
- name: InvoiceNumber
  type: STRING
  generator: invoice_number
  template: INV
  min: 10001
- name: InvoiceDate
  type: DATE
  generator: date_range
  start_days_ago: 365
  end_days_ahead: 0
  rolling: true
- name: DueDate
  type: DATE
  generator: date_range
  start_days_ago: 335
  end_days_ahead: 30
  rolling: true
- name: CustomerName
  type: STRING
  generator: entity_ref
  entity: company
  field: name
- name: CustomerIndustry
  type: STRING
  generator: entity_ref
  entity: company
  field: industry
- name: ProductName
  type: STRING
  generator: entity_ref
  entity: product
  field: name
- name: Quantity
  type: LONG
  generator: random_int
  min: 1
  max: 100
- name: UnitPrice
  type: DECIMAL
  generator: entity_ref
  entity: product
  field: unit_price
- name: Amount
  type: DECIMAL
  generator: random_decimal
  min: 100
  max: 75000
  precision: 2
- name: TaxAmount
  type: DECIMAL
  generator: random_decimal
  min: 5
  max: 6000
  precision: 2
- name: TotalAmount
  type: DECIMAL
  generator: random_decimal
  min: 105
  max: 81000
  precision: 2
- name: Status
  type: STRING
  generator: invoice_status
- name: PaymentTerms
  type: STRING
  generator: payment_terms
- name: PaymentMethod
  type: STRING
  generator: payment_method
- name: SalesRep
  type: STRING
  generator: entity_ref
  entity: sales_rep
  field: full_name
- name: FiscalPeriod
  type: STRING
  generator: fiscal_period
  source_column: InvoiceDate
