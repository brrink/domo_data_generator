dataset:
  name: AdPoint - Line Items
  domo_id: 4a55e6df-787c-47a6-b3a6-229b548c2107
  source_type: custom
  description: Synthetic line items by product type for Seattle Times ad operations
    POC
  row_count: 500
schema:
- name: LineItemId
  type: STRING
  generator: sequence
  template: LI-{i:05d}
- name: OrderId
  type: STRING
  generator: sequence
  template: ORD-2026-{i:04d}
  min: 1
  max: 150
- name: ClientName
  type: STRING
  generator: entity_ref
  entity: company
  field: name
- name: ProductType
  type: STRING
  generator: weighted_choice
  choices:
    Google Search: 0.18
    Facebook: 0.12
    Audio Recording: 0.14
    Programmatic Audio: 0.1
    Seattle Times Print: 0.12
    Display: 0.1
    Email Deployment: 0.08
    Branded Content: 0.06
    Seattle Times Digital: 0.1
- name: LineItemBudget
  type: DECIMAL
  generator: random_decimal
  min: 1500
  max: 75000
  precision: 2
- name: LineItemStartDate
  type: DATE
  generator: date_range
  start_days_ago: 90
  end_days_ahead: 120
  rolling: true
- name: LineItemEndDate
  type: DATE
  generator: date_range
  start_days_ago: 0
  end_days_ahead: 270
  rolling: true
- name: AccountManager
  type: STRING
  generator: entity_ref
  entity: sales_rep
  field: full_name
- name: AccountCoordinator
  type: STRING
  generator: random_choice
  choices:
  - Catherine Williams
  - Brad Thompson
  - Jessica Martinez
  - Sarah Chen
  - Mike O'Brien
  - Emily Rodriguez
- name: LineItemStatus
  type: STRING
  generator: weighted_choice
  choices:
    Pending Onboarding: 0.1
    Onboarding Complete: 0.15
    Submitted to Flight: 0.3
    Live: 0.2
    Complete: 0.18
    Cancelled: 0.07
- name: OnboardingCallDate
  type: DATE
  generator: date_range
  start_days_ago: 60
  end_days_ahead: 30
  rolling: true
- name: CreatedDate
  type: DATETIME
  generator: date_range
  start_days_ago: 180
  end_days_ahead: 0
  rolling: true
